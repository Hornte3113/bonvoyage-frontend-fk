name: Sync Fork con Repo Original

on:
  schedule:
    - cron: '0 */6 * * *'  # Se ejecuta cada 6 horas
  workflow_dispatch:         # También permite ejecutarlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del fork
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sincronizar con repo original
        run: |
          git remote add upstream https://github.com/luvips/bonvoyage-frontend.git
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories
          git push origin main
